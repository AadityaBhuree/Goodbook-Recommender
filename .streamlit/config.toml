[theme]
primaryColor = "#00FFFF"
backgroundColor = "#0D1117"
secondaryBackgroundColor = "#161B22"
textColor = "#E5E7EB"
font = "sans serif"

[server]
runOnSave = true
maxUploadSize = 10

[browser]
gatherUsageStats = false

[logger]
level = "info"

[runner]
# Enables the static file watching for file changes
runOnSave = true
fastReruns = true
