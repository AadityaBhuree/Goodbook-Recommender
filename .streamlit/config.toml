[theme]
primaryColor = "#2D5F6E"
backgroundColor = "#FCF9F5"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#2D2A24"
font = "sans serif"

[server]
runOnSave = true
maxUploadSize = 10

[browser]
gatherUsageStats = false

[logger]
level = "info"

[runner]
# Enables the static file watching for file changes
runOnSave = true
fastReruns = true
