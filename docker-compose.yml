# ============================================================
#  ~/.bookrecommender — Docker Compose
#  One-command deployment: docker compose up -d
# ============================================================

version: "3.9"

services:
  recommender:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bookrecommender
    ports:
      - "8501:8501"
    volumes:
      # Mount local data directory for persistent cache
      - ./data:/app/data
      # Mount local directory for hot-reload during development
      # (comment out for production)
      # - .:/app
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_MAX_UPLOAD_SIZE=10
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - recommender-net

networks:
  recommender-net:
    driver: bridge
